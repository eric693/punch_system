<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台管理 - 登入</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Sans+Thai:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0f1c3a; --navy-light: #243d6e;
    --accent: #4a7bda; --gold: #c8a96e;
    --bg: #f4f6fa; --text: #1e2a45; --muted: #8892a4;
    --border: #dde3ef; --red: #d64242;
  }
  body {
    font-family: 'Noto Sans TC', 'Noto Sans Thai', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(74,123,218,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 10%, rgba(200,169,110,0.08) 0%, transparent 55%);
  }
  .login-card {
    position: relative;
    z-index: 1;
    background: #fff;
    border-radius: 12px;
    padding: 48px 40px;
    width: 400px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.35);
  }
  .brand { text-align: center; margin-bottom: 36px; }
  .brand-title { font-size: 22px; font-weight: 700; color: var(--navy); letter-spacing: 0.04em; }
  .brand-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px; }
  .divider { width: 40px; height: 2px; background: var(--gold); margin: 12px auto; }
  label { display: block; font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  input[type="text"], input[type="password"] {
    width: 100%; padding: 12px 16px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-family: 'DM Mono', monospace; font-size: 15px; color: var(--text);
    background: var(--bg); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 14px;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(74,123,218,0.12);
    background: #fff;
  }
  .error-msg {
    font-size: 12px; color: var(--red); margin-top: 8px;
    padding: 8px 12px; background: rgba(214,66,66,0.06);
    border-radius: 6px; border-left: 3px solid var(--red);
  }
  button[type="submit"] {
    width: 100%; margin-top: 24px; padding: 13px;
    background: var(--navy); color: #fff; border: none; border-radius: 8px;
    font-family: 'Noto Sans TC', 'Noto Sans Thai', sans-serif; font-size: 15px; font-weight: 500;
    cursor: pointer; letter-spacing: 0.06em;
    transition: background 0.2s, transform 0.1s;
  }
  button[type="submit"]:hover { background: var(--navy-light); }
  button[type="submit"]:active { transform: scale(0.98); }
  .footer-note { text-align: center; font-size: 11px; color: var(--muted); margin-top: 24px; letter-spacing: 0.05em; }
  .bio-btn {
    width: 100%; padding: 12px; margin-bottom: 16px;
    background: #fff; border: 2px solid var(--accent); border-radius: 8px;
    font-family: 'Noto Sans TC', 'Noto Sans Thai', sans-serif; font-size: 14px; font-weight: 600;
    color: var(--accent); cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 8px; transition: background 0.2s, transform 0.1s;
  }
  .bio-btn:hover { background: rgba(74,123,218,0.05); }
  .bio-btn:active { transform: scale(0.98); }
  .bio-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .divider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .bio-msg { font-size: 12px; text-align: center; margin-top: 6px; min-height: 16px; }
  .bio-msg.err { color: var(--red); }
  .bio-msg.ok  { color: #2e9e6b; }
  .lang-select { position: absolute; top: 16px; right: 16px; padding: 4px 8px; border-radius: 6px; border: 1.5px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); font-size: 11px; font-weight: 600; cursor: pointer; font-family: 'Noto Sans TC', 'Noto Sans Thai', sans-serif; outline: none; transition: all 0.15s; }
  .lang-select:hover { border-color: rgba(255,255,255,0.5); color: rgba(255,255,255,0.95); }
  .lang-select option { background: #1e2a45; color: #fff; }
</style>
</head>
<body>
<select class="lang-select" id="login-lang-btn" onchange="loginSetLang(this.value)">
  <option value="zh-TW">繁體中文</option>
  <option value="en">English</option>
  <option value="ja">日本語</option>
  <option value="vi">Tiếng Việt</option>
  <option value="th">ภาษาไทย</option>
</select>
<div class="login-card">
  <div class="brand">
    <div class="brand-title" id="login-brand-title">管理後台</div>
    <div class="divider"></div>
    <div class="brand-sub">Management System</div>
  </div>

  <!-- WebAuthn biometric button (shown when supported) -->
  <div id="bio-section" style="display:none">
    <button type="button" class="bio-btn" id="bio-btn" onclick="doBioLogin()">
      <span id="bio-label">指紋 / Face ID 登入</span>
    </button>
    <div class="divider-row">
      <div class="divider-line"></div>
      <span class="divider-text" id="login-or-text">或使用密碼登入</span>
      <div class="divider-line"></div>
    </div>
  </div>

  <form method="POST" id="login-form">
    <label for="un" id="login-label-user">管理員帳號</label>
    <input type="text" id="un" name="username" placeholder="輸入帳號" autofocus autocomplete="username" autocapitalize="none">
    <label for="pw" id="login-label-pw">密碼</label>
    <input type="password" id="pw" name="password" placeholder="輸入密碼" autocomplete="current-password">
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    <button type="submit" id="login-submit-btn">登入</button>
  </form>
  <div class="bio-msg" id="bio-msg"></div>
  <div class="footer-note" id="login-footer">打卡 &amp; 排班管理系統</div>
</div>

<script>
// ── Login page i18n ───────────────────────────────────────────────
const LOGIN_I18N = {
  'zh-TW': { brand:'管理後台', bio:'指紋 / Face ID 登入', orPw:'或使用密碼登入', userLabel:'管理員帳號',
             userPh:'輸入帳號', pwLabel:'密碼', pwPh:'輸入密碼', submit:'登入',
             footer:'打卡 & 排班管理系統', toggle:'EN', verifying:'正在驗證...',
             noDevice:'找不到已綁定的裝置', success:'驗證成功，正在跳轉...', cancelled:'已取消或逾時', failed:'驗證失敗：' },
  'en':    { brand:'Admin Panel', bio:'Fingerprint / Face ID', orPw:'or sign in with password', userLabel:'Username',
             userPh:'Enter username', pwLabel:'Password', pwPh:'Enter password', submit:'Sign In',
             footer:'Attendance & Schedule System', toggle:'日本語', verifying:'Verifying...',
             noDevice:'No registered device found', success:'Verified, redirecting...', cancelled:'Cancelled or timed out', failed:'Verification failed: ' },
  'ja':    { brand:'管理パネル', bio:'指紋 / Face ID ログイン', orPw:'またはパスワードでログイン', userLabel:'ユーザー名',
             userPh:'ユーザー名を入力', pwLabel:'パスワード', pwPh:'パスワードを入力', submit:'ログイン',
             footer:'勤怠 & シフト管理システム', toggle:'Tiếng Việt', verifying:'認証中...',
             noDevice:'登録済みデバイスが見つかりません', success:'認証成功、転送中...', cancelled:'キャンセルまたはタイムアウト', failed:'認証失敗：' },
  'vi':    { brand:'Quản trị', bio:'Vân tay / Face ID', orPw:'hoặc đăng nhập bằng mật khẩu', userLabel:'Tên tài khoản',
             userPh:'Nhập tên tài khoản', pwLabel:'Mật khẩu', pwPh:'Nhập mật khẩu', submit:'Đăng nhập',
             footer:'Hệ thống Chấm công & Lịch làm việc', toggle:'ภาษาไทย', verifying:'Đang xác thực...',
             noDevice:'Không tìm thấy thiết bị đã đăng ký', success:'Xác thực thành công, đang chuyển...', cancelled:'Đã hủy hoặc hết giờ', failed:'Xác thực thất bại: ' },
  'th':    { brand:'ระบบจัดการ', bio:'ลายนิ้วมือ / Face ID', orPw:'หรือเข้าสู่ระบบด้วยรหัสผ่าน', userLabel:'ชื่อผู้ใช้',
             userPh:'กรอกชื่อผู้ใช้', pwLabel:'รหัสผ่าน', pwPh:'กรอกรหัสผ่าน', submit:'เข้าสู่ระบบ',
             footer:'ระบบบันทึกเวลา & ตารางงาน', toggle:'中文', verifying:'กำลังยืนยัน...',
             noDevice:'ไม่พบอุปกรณ์ที่ลงทะเบียน', success:'ยืนยันสำเร็จ กำลังเปลี่ยนเส้นทาง...', cancelled:'ยกเลิกหรือหมดเวลา', failed:'การยืนยันล้มเหลว: ' }
};
let _loginLang = localStorage.getItem('adminLang') || 'zh-TW';
function loginT(k) { return (LOGIN_I18N[_loginLang]||LOGIN_I18N['zh-TW'])[k] || k; }
function loginApplyI18n() {
  const s = (id, txt) => { const e = document.getElementById(id); if (e) e.textContent = txt; };
  const p = (id, txt) => { const e = document.getElementById(id); if (e) e.placeholder = txt; };
  s('login-brand-title', loginT('brand'));
  s('bio-label', loginT('bio'));
  s('login-or-text', loginT('orPw'));
  s('login-label-user', loginT('userLabel'));
  s('login-label-pw', loginT('pwLabel'));
  s('login-submit-btn', loginT('submit'));
  s('login-footer', loginT('footer'));
  const sel = document.getElementById('login-lang-btn');
  if (sel) sel.value = _loginLang;
  p('un', loginT('userPh'));
  p('pw', loginT('pwPh'));
  document.documentElement.lang = _loginLang;
}
function loginSetLang(lang) {
  _loginLang = lang;
  localStorage.setItem('adminLang', lang);
  loginApplyI18n();
}
document.addEventListener('DOMContentLoaded', () => {
  loginApplyI18n();
});

// ── WebAuthn helpers ──────────────────────────────────────────────
function b2b64url(buf){
  const b=new Uint8Array(buf);let s='';
  b.forEach(x=>s+=String.fromCharCode(x));
  return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function b64url2buf(s){
  const b=s.replace(/-/g,'+').replace(/_/g,'/');
  const bin=atob(b);const u=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);
  return u.buffer;
}
function bioMsg(msg,type){
  const el=document.getElementById('bio-msg');
  el.textContent=msg;el.className='bio-msg'+(type?' '+type:'');
}

// Show biometric button if WebAuthn is supported
if(window.PublicKeyCredential){
  document.getElementById('bio-section').style.display='';
  // Detect platform authenticator type (face vs fingerprint is OS-level, we just show generic label)
  if(PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable){
    PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then(ok=>{
      if(!ok) document.getElementById('bio-section').style.display='none';
    });
  }
}

async function doBioLogin(){
  const btn=document.getElementById('bio-btn');
  btn.disabled=true;
  bioMsg(loginT('verifying'));
  // Use username from input if filled, otherwise let server return all credentials
  const username=document.getElementById('un').value.trim()||null;
  try{
    const beginRes=await fetch('/api/webauthn/auth/begin',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Lang':_loginLang},
      body:JSON.stringify({username})
    });
    if(!beginRes.ok){const d=await beginRes.json();bioMsg(d.error||loginT('noDevice'),'err');return;}
    const opts=await beginRes.json();
    // Convert base64url → ArrayBuffer
    opts.challenge=b64url2buf(opts.challenge);
    if(opts.allowCredentials){
      opts.allowCredentials=opts.allowCredentials.map(c=>({...c,id:b64url2buf(c.id)}));
    }
    const cred=await navigator.credentials.get({publicKey:opts});
    const completeRes=await fetch('/api/webauthn/auth/complete',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Lang':_loginLang},
      body:JSON.stringify({
        id:cred.id,
        rawId:b2b64url(cred.rawId),
        response:{
          authenticatorData:b2b64url(cred.response.authenticatorData),
          clientDataJSON:b2b64url(cred.response.clientDataJSON),
          signature:b2b64url(cred.response.signature),
          userHandle:cred.response.userHandle?b2b64url(cred.response.userHandle):null
        },
        type:cred.type
      })
    });
    const result=await completeRes.json().catch(()=>({}));
    if(!completeRes.ok){bioMsg(result.error||'伺服器錯誤（'+completeRes.status+'）','err');return;}
    bioMsg(loginT('success'),'ok');
    window.location.href='/admin';
  }catch(e){
    if(e.name==='NotAllowedError'){bioMsg(loginT('cancelled'),'err');}
    else{bioMsg(loginT('failed')+e.message,'err');}
  }finally{
    btn.disabled=false;
  }
}
</script>
</body>
</html>
